name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gymos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gymos_test?schema=public
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
      CORS_ORIGIN: http://localhost:3000
      BCRYPT_ROUNDS: "1"
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL_DAYS: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma migrate deploy
        run: pnpm --filter api exec prisma migrate deploy

      - name: Lint, typecheck, test, e2e, build
        run: pnpm exec turbo run lint typecheck test test:e2e build --filter=api
